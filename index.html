      - script-src allows 'unsafe-eval' because Babel Standalone compiles the

      - unpkg.com is whitelisted for React, ReactDOM, Babel Standalone, PeerJS.

const { useState, useEffect, useRef, useCallback } = React;

const WINNING_COMBOS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function checkWinner(board) {
  for (let [a,b,c] of WINNING_COMBOS) {
    if (board[a] && board[a] === board[b] && board[a] === board[c])
      return { winner: board[a], line: [a,b,c] };
  }
  if (board.every(Boolean)) return { winner: "draw", line: [] };
  return null;
}

function minimax(board, isMaximizing, depth) {
  const result = checkWinner(board);
  if (result) {
    if (result.winner === "O") return 10 - depth;
    if (result.winner === "X") return depth - 10;
    return 0;
  }
  const moves = board.map((v, i) => v ? null : i).filter(i => i !== null);
  if (moves.length === 0) return 0;
  if (isMaximizing) {
    let best = -Infinity;
    for (let i of moves) {
      board[i] = "O";
      best = Math.max(best, minimax(board, false, depth + 1));
      board[i] = null;
    }
    return best;
  } else {
    let best = Infinity;
    for (let i of moves) {
      board[i] = "X";
      best = Math.min(best, minimax(board, true, depth + 1));
      board[i] = null;
    }
    return best;
  }
}

function getAIMove(board) {
  const moves = board.map((v, i) => v ? null : i).filter(i => i !== null);
  if (moves.length === 0) return -1;
  let bestVal = -Infinity, bestMove = moves[0];
  for (let i of moves) {
    board[i] = "O";
    const val = minimax(board, false, 0);
    board[i] = null;
    if (val > bestVal) { bestVal = val; bestMove = i; }
  }
  return bestMove;
}

// Picks a random open cell — used by Easy mode and as the
// occasional "mistake" move for Hard mode.
function getRandomMove(board) {
  const moves = board.map((v, i) => v ? null : i).filter(i => i !== null);
  if (moves.length === 0) return -1;
  return moves[Math.floor(Math.random() * moves.length)];
}

// Returns a move for the AI based on the selected difficulty.
// "easy"       -> mostly random, can miss wins/blocks
// "hard"       -> uses minimax most of the time, occasionally slips
// "unbeatable" -> always uses minimax (existing behavior)
function getAIMoveForDifficulty(board, difficulty) {
  if (difficulty === "easy") {
    // 75% random, 25% optimal — beatable, occasionally still scores.
    if (Math.random() < 0.75) return getRandomMove(board);
    return getAIMove(board);
  }
  if (difficulty === "hard") {
    // 80% optimal, 20% random slip.
    if (Math.random() < 0.2) return getRandomMove(board);
    return getAIMove(board);
  }
  // unbeatable (default)
  return getAIMove(board);
}

let firebaseLoadPromise = null;

// True once Firebase has failed to load/initialize at least once. Read by
// the UI so multiplayer-only actions can be hidden/disabled instead of
// silently hanging after the first failure.
let firebaseUnavailable = false;

// Loads the Firebase compat SDK scripts (app + database) from CDN and
// initializes the app exactly once, no matter how many times this is
// called. Returns a promise that resolves once window.firebase is ready
// to use.
//
// Everything here is wrapped in try/catch so that a network failure
// (very common for a WebView-packaged APK running from file:// with no
// internet permission granted, or plain offline use) can never throw an
// uncaught exception into the JS runtime. Uncaught errors during React's
// initial render/effects are the classic cause of a "blank screen" app,
// so this function guarantees it only ever resolves or rejects its
// promise — it never throws synchronously.
function loadFirebase() {
  if (firebaseLoadPromise) return firebaseLoadPromise;

  firebaseLoadPromise = new Promise((resolve, reject) => {
    try {
      if (window.firebase && window.firebase.apps && window.firebase.apps.length) {
        resolve(window.firebase);
        return;
      }

      function loadScript(src) {
        return new Promise((res, rej) => {
          try {
            const s = document.createElement("script");
            s.src = src;
            s.async = true;
            s.onload = () => res();
            s.onerror = () => rej(new Error(`Failed to load ${src}`));
            document.head.appendChild(s);
          } catch (e) {
            rej(e);
          }
        });
      }

      loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js")
        .then(() => loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"))
        .then(() => {
          try {
            if (!window.firebase.apps.length) {
              window.firebase.initializeApp(firebaseConfig);
            }
            resolve(window.firebase);
          } catch (initErr) {
            reject(initErr);
          }
        })
        .catch(reject);
    } catch (syncErr) {
      // Guards against any unexpected synchronous throw above (e.g. the
      // WebView blocking document.createElement/script injection outright).
      reject(syncErr);
    }
  });

  // Side-channel notification: every call site below still does its own
  // loadFirebase().then(...) for its specific feature, but this single
  // subscriber is what tells the rest of the UI "multiplayer/network
  // features are down" exactly once, without needing a .catch() added to
  // every individual call site. This also prevents the failure from ever
  // surfacing only as a silent unhandled promise rejection.
  firebaseLoadPromise.catch((err) => {
    firebaseUnavailable = true;
    console.error("Firebase failed to initialize:", err);
    try {
      window.dispatchEvent(
        new CustomEvent("firebase-unavailable", {
          detail: { message: (err && err.message) || String(err) },
        })
      );
    } catch (e) {
      // CustomEvent should always be available in a modern WebView, but
      // don't let a dispatch failure cascade into anything worse.
    }
  });

  return firebaseLoadPromise;
}

          width: p.size, height: p.size,
          borderRadius: "50%",
          background: p.color,
          boxShadow: `0 0 12px ${p.color}`,
          animation: `floatUp ${p.duration} ${p.delay} linear infinite`,
          opacity: 0,
        }} />
      ))}
    </div>
  );
}

function Confetti({ active }) {
  if (!active) return null;
  const pieces = Array.from({ length: 38 }, (_, i) => ({
    id: i,
    left: `${Math.random() * 100}%`,
    color: ["#b16eff","#f472b6","#38bdf8","#fbbf24","#34d399","#f87171"][i % 6],
    size: `${7 + Math.random() * 9}px`,
    duration: `${2 + Math.random() * 1}s`, // 2s - 3s
    delay: `${Math.random() * 0.4}s`,
    riseHeight: `${40 + Math.random() * 30}vh`, // how high it pops up from the bottom
    drift: `${(Math.random() - 0.5) * 120}px`, // sideways scatter
    shape: i % 3 === 0 ? "50%" : "2px",
  }));
  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 100 }}>
      {pieces.map(p => (
        <div key={p.id} style={{
          position: "absolute", bottom: -20,
          left: p.left, width: p.size, height: p.size,
          background: p.color, borderRadius: p.shape,
          animation: `confettiPop ${p.duration} ${p.delay} cubic-bezier(0.15, 0.7, 0.4, 1) forwards`,
          boxShadow: `0 0 10px ${p.color}`,
          "--rise": p.riseHeight,
          "--drift": p.drift,
        }} />
      ))}
    </div>
  );
}

// Small live countdown shown on the full-screen invite prompt, ticking
// down from the invite's createdAt timestamp to its 10-second expiry.
// Purely visual — actual expiry/cleanup is handled by the invite listener
// in App, this just reflects the same 10s window on screen.
function InviteCountdown({ createdAt }) {
  const TTL_MS = 10000;
  const [msLeft, setMsLeft] = useState(() => Math.max(0, TTL_MS - (Date.now() - (createdAt || Date.now()))));

  useEffect(() => {
    const tick = () => setMsLeft(Math.max(0, TTL_MS - (Date.now() - (createdAt || Date.now()))));
    tick();
    const id = setInterval(tick, 100);
    return () => clearInterval(id);
  }, [createdAt]);

  const secondsLeft = Math.ceil(msLeft / 1000);
  const pct = Math.max(0, Math.min(100, (msLeft / TTL_MS) * 100));

  return (
    <div>
      <div style={{
        height: 6, borderRadius: 6, background: "rgba(255,255,255,0.1)",
        overflow: "hidden",
      }}>
        <div style={{
          height: "100%", width: `${pct}%`,
          background: pct > 30 ? "linear-gradient(90deg, #34d399, #10b981)" : "linear-gradient(90deg, #f87171, #ef4444)",
          transition: "width 0.1s linear, background 0.3s",
        }} />
      </div>
      <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700, marginTop: 8 }}>
        Expires in {secondsLeft}s
      </div>
    </div>
  );
}

// ─── Online Lobby Screen ──────────────────────────────────────────────────────
function OnlineLobby({ onBack, onGameStart, initialJoinCode, autoCreate, onRoomCodeGenerated, myIsOwner, myName }) {
  const [screen, setScreen] = useState("choose"); // choose | create | join | random
  const [roomCode, setRoomCode] = useState("");
  const [joinCode, setJoinCode] = useState(initialJoinCode || "");
  const [status, setStatus] = useState("");
  const [error, setError] = useState("");
  const peerRef = useRef(null);
  const connRef = useRef(null);
  // Tracks the Firebase matchmaking queue entry so we can clean it up
  // (remove our own waiting ticket, clear timers) if the player cancels
  // or the component unmounts mid-search.
  const matchmakingRef = useRef({ myTicketRef: null, cancelled: false });
  // Set to true right before calling onGameStart so the unmount cleanup
  // below knows ownership of conn/peer has passed to App and must NOT
  // close/destroy them. Without this guard, the moment App switches mode
  // to "online" this component unmounts and its cleanup was closing the
  // very connection that was just handed off — killing the link right
  // after every successful handshake (host and guest both affected).
  const handedOffRef = useRef(false);

  // Cleanup peer on unmount
  useEffect(() => {
    return () => {
      if (handedOffRef.current) return;
      if (connRef.current) { try { connRef.current.close(); } catch(e){} }
      if (peerRef.current) { try { peerRef.current.destroy(); } catch(e){} }
      cleanupMatchmaking();
    };
  }, []);

  // Friend-invite auto-trigger: if opened with autoCreate (inviter) or
  // initialJoinCode (invitee), automatically kick off the existing
  // create/join flows below — no changes to handleCreate/handleJoin
  // themselves, just calling them once on mount.
  useEffect(() => {
    if (autoCreate) {
      handleCreate();
    } else if (initialJoinCode) {
      setScreen("join");
      // handleJoin reads from joinCode state; it's already pre-filled via
      // useState(initialJoinCode || "") above, so this just fires the
      // existing join logic on the next tick once state has settled.
      const t = setTimeout(() => handleJoin(), 0);
      return () => clearTimeout(t);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Report the generated room code back to the parent (App), so the
  // inviter's invite record always reflects the code their OnlineLobby is
  // actually hosting. Purely informational — doesn't affect connection logic.
  useEffect(() => {
    if (roomCode && onRoomCodeGenerated) onRoomCodeGenerated(roomCode);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [roomCode]);

  function destroyPeer() {
    if (connRef.current) { try { connRef.current.close(); } catch(e){} connRef.current = null; }
    if (peerRef.current) { try { peerRef.current.destroy(); } catch(e){} peerRef.current = null; }
  }

  // Removes our own waiting-queue ticket from Firebase (if any) and
  // clears any pending give-up timer, so a cancelled or completed search
  // doesn't leave stale entries for future players to match into.
  function cleanupMatchmaking() {
    const mm = matchmakingRef.current;
    mm.cancelled = true;
    if (mm.giveUpTimer) clearTimeout(mm.giveUpTimer);
    try { mm.myTicketRef?.remove(); } catch(e){}
    matchmakingRef.current = { myTicketRef: null, cancelled: false };
  }

  // Random matchmaking: pairs two strangers automatically using a
  // Firebase Realtime Database queue. Once paired, the actual gameplay
  // connection is still direct device-to-device via PeerJS — Firebase is
  // only used to help the two devices find each other's room code.
  //
  // How it works:
  // 1. Look in the "matchQueue" node for an existing waiting player.
  // 2. If one exists, claim it (remove their ticket) and join their
  //    PeerJS room as the guest — reusing handleJoin's exact connection
  //    logic via a shared internal helper.
  // 3. If none exists, add our own ticket with a fresh room code, host a
  //    PeerJS room (reusing handleCreate's logic), and wait for someone
  //    else to claim it.
  function handleRandomMatch() {
    setScreen("random");
    setError("");
    setStatus("Connecting to matchmaking...");
    matchmakingRef.current.cancelled = false;

    loadFirebase().then((firebase) => {
      if (matchmakingRef.current.cancelled) return;
      const db = firebase.database();
      const queueRef = db.ref("matchQueue");

      setStatus("Searching for an opponent...");

      queueRef.limitToFirst(1).once("value").then((snapshot) => {
        if (matchmakingRef.current.cancelled) return;
        const val = snapshot.val();

        if (val) {
          // Found someone waiting — claim their ticket and join as guest.
          const oppKey = Object.keys(val)[0];
          const oppData = val[oppKey];
          queueRef.child(oppKey).remove().then(() => {
            if (matchmakingRef.current.cancelled) return;
            setStatus("Opponent found! Connecting...");
            joinAsGuest(oppData.roomCode);
          }).catch(() => {
            // Someone else claimed it first (race) — fall back to hosting.
            if (matchmakingRef.current.cancelled) return;
            hostAndWait(queueRef);
          });
        } else {
          // Nobody waiting — become the host and wait for someone to join.
          hostAndWait(queueRef);
        }
      }).catch((err) => {
        setError(`Matchmaking error: ${err.message || "connection failed"}`);
        setStatus("");
      });
    }).catch((err) => {
      setError("Couldn't reach matchmaking service. Check your connection.");
      setStatus("");
    });
  }

  // Posts our own waiting ticket to the queue, hosts a PeerJS room under
  // that ticket's room code, and listens for our ticket being removed
  // (meaning another player claimed it and is connecting to us).
  function hostAndWait(queueRef) {
    if (matchmakingRef.current.cancelled) return;
    const code = generateRoomCode();
    const ticketRef = queueRef.push({ roomCode: code, ts: Date.now() });
    matchmakingRef.current.myTicketRef = ticketRef;

    setStatus("Waiting for an opponent to join...");
    hostRoom(code);

    // If nobody claims us within 25s, give up and show an error rather
    // than leaving the player waiting forever with no feedback.
    const giveUpTimer = setTimeout(() => {
      if (matchmakingRef.current.cancelled) return;
      ticketRef.remove().catch(() => {});
      setError("No opponents found right now. Please try again.");
      setStatus("");
      destroyPeer();
    }, 25000);

    matchmakingRef.current.giveUpTimer = giveUpTimer;
  }

  // Shared host-side PeerJS setup, used by both "Create Private Room"
  // and random matchmaking (when we end up being the host).
  function hostRoom(code) {
    setRoomCode(code);

    const peer = new window.Peer(codeToPeerId(code), {
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:global.stun.twilio.com:3478" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443?transport=tcp",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ]
      }
    });
    peerRef.current = peer;

    peer.on("error", (err) => {
      if (err.type === "unavailable-id") {
        setError("Code conflict. Retrying...");
        destroyPeer();
        setTimeout(() => hostRoom(generateRoomCode()), 800);
      } else {
        setError(`System error: ${err.type}`);
      }
    });

    peer.on("connection", (conn) => {
      connRef.current = conn;
      if (matchmakingRef.current.giveUpTimer) clearTimeout(matchmakingRef.current.giveUpTimer);
      setStatus("Partner joining...");
      let started = false;
      conn.on("open", () => {
        if (started) return;
        started = true;
        conn.send({ type: "START", hostSymbol: "X", guestSymbol: "O", hostIsOwner: !!myIsOwner, hostName: myName || "Opponent" });
        handedOffRef.current = true;
        matchmakingRef.current.cancelled = true;
        onGameStart({ conn, mySymbol: "X", peer, roomCode: code, oppIsOwner: false, oppName: "Opponent" });
      });
      conn.on("error", (e) => setError(`Session lost: ${e.message}`));
    });
  }

  // Shared guest-side PeerJS setup, used by both "Join by Room Code"
  // and random matchmaking (when we end up being the guest).
  function joinAsGuest(code) {
    const peer = new window.Peer({
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:global.stun.twilio.com:3478" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443?transport=tcp",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ]
      }
    });
    peerRef.current = peer;

    peer.on("open", () => {
      const conn = peer.connect(codeToPeerId(code), { reliable: true });
      connRef.current = conn;

      conn.on("open", () => {
        setStatus("Access granted! Entering match...");
      });

      let started = false;
      const joinTimeout = setTimeout(() => {
        if (peerRef.current && !connRef.current?.open) {
          setError("Opponent connection timed out.");
          setStatus("");
          destroyPeer();
        }
      }, 15000);

      conn.on("data", (data) => {
        if (data.type === "START") {
          if (started) return;
          started = true;
          clearTimeout(joinTimeout);
          handedOffRef.current = true;
          matchmakingRef.current.cancelled = true;
          onGameStart({ conn, mySymbol: data.guestSymbol, peer, roomCode: code, oppIsOwner: !!data.hostIsOwner, oppName: data.hostName || "Opponent" });
        }
      });

      conn.on("error", (e) => setError(`Gateway error: ${e.message}`));
    });

    peer.on("error", (err) => {
      if (err.type === "peer-unavailable") {
        setError("Opponent's room is no longer available.");
      } else {
        setError(`Error: ${err.type}`);
      }
      setStatus("");
    });
  }

  function handleCreate() {
    setScreen("create");
    setError("");
    const code = generateRoomCode();
    setRoomCode(code);
    setStatus("Establishing connection...");

    const peer = new window.Peer(codeToPeerId(code), {
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:global.stun.twilio.com:3478" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443?transport=tcp",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ]
      }
    });
    peerRef.current = peer;

    peer.on("open", () => {
      setStatus("Room online! Waiting for partner...");
    });

    peer.on("error", (err) => {
      if (err.type === "unavailable-id") {
        setError("Code conflict. Retrying...");
        destroyPeer();
        setTimeout(() => handleCreate(), 800);
      } else {
        setError(`System error: ${err.type}`);
      }
    });

    peer.on("connection", (conn) => {
      connRef.current = conn;
      setStatus("Partner joining...");
      let started = false;
      conn.on("open", () => {
        if (started) return;
        started = true;
        // Host is X (goes first), guest is O
        conn.send({ type: "START", hostSymbol: "X", guestSymbol: "O", hostIsOwner: !!myIsOwner, hostName: myName || "Opponent" });
        handedOffRef.current = true;
        onGameStart({ conn, mySymbol: "X", peer, roomCode: code, oppIsOwner: false, oppName: "Opponent" });
      });
      conn.on("error", (e) => setError(`Session lost: ${e.message}`));
    });
  }

  function handleJoin() {
    const code = joinCode.replace(/\D/g, "").slice(0, 6);
    if (code.length !== 6) { setError("6-digit code required."); return; }
    setError("");
    setStatus("Searching for room...");

    const peer = new window.Peer({
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:global.stun.twilio.com:3478" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443?transport=tcp",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ]

    });
    peerRef.current = peer;

    peer.on("open", () => {
      setStatus("Handshaking...");
      const conn = peer.connect(codeToPeerId(code), { reliable: true });
      connRef.current = conn;

      conn.on("open", () => {
        setStatus("Access granted! Entering match...");
      });

      let started = false;
      const joinTimeout = setTimeout(() => {
        if (peerRef.current && !connRef.current?.open) {
          setError("Room timeout. Please check code.");
          setStatus("");
          destroyPeer();
        }
      }, 15000);

      conn.on("data", (data) => {
        if (data.type === "START") {
          if (started) return;
          started = true;
          clearTimeout(joinTimeout);
          handedOffRef.current = true;
          onGameStart({ conn, mySymbol: data.guestSymbol, peer, roomCode: code, oppIsOwner: !!data.hostIsOwner, oppName: data.hostName || "Opponent" });
        }
      });

      conn.on("error", (e) => setError(`Gateway error: ${e.message}`));
    });

    peer.on("error", (err) => {
      if (err.type === "peer-unavailable") {
        setError("Room ID not found.");
      } else {
        setError(`Error: ${err.type}`);
      }
      setStatus("");
    });

    // Timeout after 15s
    setTimeout(() => {
      if (peerRef.current && !connRef.current?.open) {
        setError("Connection timeout.");
        setStatus("");
        destroyPeer();
      }

    );
  }

// Animated sticker component — cycles through frames
function AnimatedSticker({ frames, size = 32, running = true }) {
  const [frame, setFrame] = useState(0);
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setFrame(f => (f + 1) % frames.length), 300);
    return () => clearInterval(id);
  }, [frames, running]);
  return <span style={{ fontSize: size, lineHeight: 1, display: "inline-block" }}>{frames[frame]}</span>;
}

function AchievementsScreen({ onBack, localUid, wallet, onClaimReward, friendsCount, achievementProgress, onProgressUpdate }) {

  const [claiming, setClaiming] = useState(null);

  const [progress, setProgress] = useState(achievementProgress || {});

  useEffect(() => {
    if (achievementProgress) setProgress(achievementProgress);
  }, [achievementProgress]);

  function showToast(msg, ok = true) {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 2800);
  }

  function getStatValue(stat) {
    const p = progress || {};
    if (stat === "totalGames") return p.totalGames || 0;
    if (stat === "wins")       return p.wins || 0;
    if (stat === "friends")    return friendsCount || 0;
    if (stat === "loginDays")  return p.loginDays || 0;
    return 0;
  }

  function isUnlocked(ach) {
    return getStatValue(ach.stat) >= ach.goal;
  }

  function isClaimed(ach) {
    return !!(progress?.claimed?.[ach.id]);

    if (!isUnlocked(ach) || isClaimed(ach) || claiming) return;

        const newProgress = {
          ...progress,
          claimed: { ...(progress?.claimed || {}), [ach.id]: true },
