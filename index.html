// ─── Mailbox System ───────────────────────────────────────────────────────────
// Mail types: "reward" | "announcement" | "event"
// Mail shape stored in Firebase at mailbox/{uid}/{mailId}:
// {
//   id, type, title, message, date (ISO string),
//   reward?: { gold?: number, diamonds?: number, label?: string },
//   claimed: false,
//   read: false,
//   sentAt: timestamp  ← for admin-panel ordering
// }
//
// Global / broadcast mail is stored at globalMail/{mailId}.
// A per-user claim record lives at mailbox/{uid}/{mailId}/claimed (bool).
// This structure is intentionally admin-panel-ready: admin writes to
// globalMail/{id} to send to everyone, or mailbox/{uid}/{id} for targeted mail.

const MAIL_TYPE_META = {
  reward:       { label: "Reward",       color: "#fbbf24", icon: "🎁", border: "rgba(251,191,36,0.35)", bg: "rgba(251,191,36,0.07)" },
  announcement: { label: "Announcement", color: "#a78bfa", icon: "📢", border: "rgba(167,139,250,0.35)", bg: "rgba(167,139,250,0.07)" },
  event:        { label: "Event",        color: "#f472b6", icon: "🎉", border: "rgba(244,114,182,0.35)", bg: "rgba(244,114,182,0.07)" },
};

function MailboxScreen({ onBack, localUid, wallet, onClaimReward, unreadCount }) {
  const [mails, setMails] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null); // mail id
  const [claiming, setClaiming] = useState(null); // mail id
  const [toast, setToast] = useState(null);

  function showToast(msg, ok = true) {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 2800);
  }

  // Merge personal + global mail, attach per-user claim status for global
  useEffect(() => {
    if (!localUid) return;
    setLoading(true);
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const personalRef = db.ref(`userMails/${localUid}`);
      const globalRef   = db.ref("globalMail");

      let personal = {};
      let global   = {};
      let claimedGlobal = {};

      function merge() {
        const all = {};
        // Personal mail
        Object.entries(personal).forEach(([id, m]) => {
          all[id] = { ...m, id, _source: "personal" };
        });
        // Global mail merged with per-user claim status
        Object.entries(global).forEach(([id, m]) => {
          if (!all[id]) {
            all[id] = { ...m, id, _source: "global", claimed: !!(claimedGlobal[id]) };
          }
        });
        const sorted = Object.values(all).sort((a, b) => (b.sentAt || 0) - (a.sentAt || 0));
        setMails(sorted);
        setLoading(false);
      }

      // Listen to personal mail
      personalRef.on("value", snap => {
        personal = snap.val() || {};
        merge();
      });

      // Listen to global mail
      globalRef.on("value", snap => {
        global = snap.val() || {};
        merge();
      });

      // Listen to per-user global mail claim records
      const claimRef = db.ref(`globalMailClaims/${localUid}`);
      claimRef.on("value", snap => {
        claimedGlobal = snap.val() || {};
        merge();
      });

      return () => {
        personalRef.off();
        globalRef.off();
        claimRef.off();
      };
    });
  }, [localUid]);

  // Mark a mail as read in Firebase
  function markRead(mail) {
    if (mail.read) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      if (mail._source === "personal") {
        db.ref(`userMails/${localUid}/${mail.id}/read`).set(true).catch(() => {});
      } else {
        // For global mail, track read status per user
        db.ref(`globalMailClaims/${localUid}/${mail.id}`).transaction(cur => {
          return cur ? cur : { claimed: false };
        }).catch(() => {});
      }
    });
    setMails(prev => prev.map(m => m.id === mail.id ? { ...m, read: true } : m));
  }

  function handleSelect(mail) {
    setSelected(sel => sel === mail.id ? null : mail.id);
    markRead(mail);
  }

  function handleClaim(mail) {
    if (!mail.reward || mail.claimed) return;
    setClaiming(mail.id);
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const claimMark = () => {
        if (mail._source === "personal") {
          return db.ref(`userMails/${localUid}/${mail.id}/claimed`).set(true);
        } else {
          return db.ref(`globalMailClaims/${localUid}/${mail.id}`).set({ claimed: true, claimedAt: firebase.database.ServerValue.TIMESTAMP });
        }
      };
      return claimMark().then(() => {
        setMails(prev => prev.map(m => m.id === mail.id ? { ...m, claimed: true } : m));
        setClaiming(null);
        onClaimReward(mail.reward);
        const parts = [];
        if (mail.reward.type === "gold")           parts.push(`🪙 ${Number(mail.reward.amount).toLocaleString()} Gold`);
        else if (mail.reward.type === "diamonds")  parts.push(`💎 ${Number(mail.reward.amount).toLocaleString()} WB Diamonds`);
        else {
          if (mail.reward.gold)     parts.push(`🪙 ${mail.reward.gold} Gold`);
          if (mail.reward.diamonds) parts.push(`💎 ${mail.reward.diamonds} Diamonds`);
        }
        if (mail.reward.label)    parts.push(mail.reward.label);
        showToast(`Claimed: ${parts.join(" + ")} ✅`);
      });
    }).catch(() => {
      setClaiming(null);
      showToast("Claim failed. Please try again.", false);
    });
  }

  const unread = mails.filter(m => !m.read).length;

  const cardBase = {
    background: "rgba(15, 23, 42, 0.85)",
    backdropFilter: "blur(40px)", WebkitBackdropFilter: "blur(40px)",
    borderRadius: 32, padding: "28px 22px",
    width: "100%", maxWidth: 420,
    border: "1px solid rgba(255,255,255,0.1)",
    boxShadow: "0 25px 50px -12px rgba(0,0,0,0.5)",
    animation: "slideUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) both",
    position: "relative", zIndex: 2,
  };

  return (
    <div style={cardBase}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)",
          zIndex: 300, padding: "10px 22px", borderRadius: 14,
          background: toast.ok ? "rgba(52,211,153,0.96)" : "rgba(239,68,68,0.93)",
          color: "#fff", fontWeight: 800, fontSize: 13,
          boxShadow: "0 6px 20px rgba(0,0,0,0.4)",
          animation: "cellPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both",
          whiteSpace: "nowrap", pointerEvents: "none",
        }}>{toast.msg}</div>
      )}

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <button onClick={onBack} style={{
          width: 36, height: 36, borderRadius: "50%",
          background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)",
          color: "#94a3b8", fontSize: 16, cursor: "pointer", fontWeight: 800,
        }}>←</button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 16, fontWeight: 900, color: "#fff", display: "flex", alignItems: "center", gap: 8 }}>
            📬 MAILBOX
            {unread > 0 && (
              <span style={{
                background: "#ef4444", color: "#fff", fontSize: 10, fontWeight: 900,
                borderRadius: 20, padding: "2px 7px", lineHeight: 1.4,
                boxShadow: "0 0 8px rgba(239,68,68,0.5)",
              }}>{unread}</span>
            )}
          </div>
          <div style={{ fontSize: 9, color: "#64748b", fontWeight: 700, letterSpacing: "1.5px" }}>
            {mails.length} MESSAGE{mails.length !== 1 ? "S" : ""}
          </div>
        </div>
        <div style={{ width: 36 }} />
      </div>

      {/* Wallet strip */}
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        {[
          { emoji: "🪙", label: "GOLD",     value: wallet.gold,     color: "#fbbf24", bg: "rgba(251,191,36,0.08)", border: "rgba(251,191,36,0.25)" },
          { emoji: "💎", label: "DIAMONDS", value: wallet.diamonds, color: "#38bdf8", bg: "rgba(56,189,248,0.08)", border: "rgba(56,189,248,0.25)" },
        ].map(w => (
          <div key={w.label} style={{
            flex: 1, display: "flex", alignItems: "center", gap: 7,
            background: w.bg, border: `1px solid ${w.border}`, borderRadius: 12, padding: "7px 11px",
          }}>
            <span style={{ fontSize: 16 }}>{w.emoji}</span>
            <div>
              <div style={{ fontSize: 14, fontWeight: 900, color: w.color, lineHeight: 1 }}>{w.value.toLocaleString()}</div>
              <div style={{ fontSize: 8, color: "#64748b", fontWeight: 700, marginTop: 1 }}>{w.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Mail list */}
      <div style={{ overflowY: "auto", maxHeight: 460, scrollbarWidth: "none" }}>
        {loading && (
          <div style={{ textAlign: "center", color: "#64748b", fontSize: 13, fontWeight: 700, padding: "40px 0" }}>
            Loading mail{[0,1,2].map(i => <span key={i} style={{ animation: `dotBlink 1s ${i*0.2}s infinite`, margin: "0 1px" }}>.</span>)}
          </div>
        )}
        {!loading && mails.length === 0 && (
          <div style={{ textAlign: "center", padding: "50px 20px" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📭</div>
            <div style={{ fontSize: 14, color: "#64748b", fontWeight: 700 }}>Your mailbox is empty.</div>
            <div style={{ fontSize: 11, color: "#475569", fontWeight: 600, marginTop: 6 }}>Check back later for rewards!</div>
          </div>
        )}
        {!loading && mails.map(mail => {
          const meta = MAIL_TYPE_META[mail.type] || MAIL_TYPE_META.announcement;
          const isOpen = selected === mail.id;
          const hasReward = !!mail.reward;
          const claimable = hasReward && !mail.claimed;
          return (
            <div key={mail.id} style={{
              marginBottom: 10, borderRadius: 18,
              border: `1px solid ${isOpen ? meta.border : (mail.read ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.14)")}`,
              background: isOpen ? meta.bg : (mail.read ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.05)"),
              transition: "all 0.2s",
              overflow: "hidden",
            }}>
              {/* Mail row */}
              <button
                onClick={() => handleSelect(mail)}
                style={{
                  display: "flex", alignItems: "center", gap: 12,
                  width: "100%", padding: "13px 14px",
                  background: "none", border: "none", cursor: "pointer", textAlign: "left",
                }}
              >
                {/* Type icon */}
                <div style={{
                  width: 38, height: 38, borderRadius: 12, flexShrink: 0,
                  background: meta.bg, border: `1px solid ${meta.border}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 18,
                }}>{meta.icon}</div>

                {/* Main info */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                    {!mail.read && (
                      <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#ef4444", flexShrink: 0, boxShadow: "0 0 6px rgba(239,68,68,0.6)" }} />
                    )}
                    <span style={{ fontSize: 13, fontWeight: 800, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {mail.title}
                    </span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 9, fontWeight: 700, color: meta.color, letterSpacing: "0.5px" }}>
                      {meta.label.toUpperCase()}
                    </span>
                    <span style={{ fontSize: 9, color: "#475569", fontWeight: 600 }}>
                      {mail.date || (mail.sentAt ? new Date(mail.sentAt).toLocaleDateString() : "")}
                    </span>
                  </div>
                </div>

                {/* Reward / claimed badge */}
                <div style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 }}>
                  {hasReward && (
                    <span style={{
                      fontSize: 9, fontWeight: 800, letterSpacing: "0.3px", padding: "2px 7px", borderRadius: 8,
                      background: mail.claimed ? "rgba(71,85,105,0.5)" : "rgba(251,191,36,0.15)",
                      color: mail.claimed ? "#64748b" : "#fbbf24",
                      border: `1px solid ${mail.claimed ? "rgba(71,85,105,0.3)" : "rgba(251,191,36,0.3)"}`,
                    }}>{mail.claimed ? "✓ CLAIMED" : "🎁 REWARD"}</span>
                  )}
                  <span style={{ fontSize: 11, color: "#475569" }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </button>

              {/* Expanded view */}
              {isOpen && (
                <div style={{ padding: "0 14px 16px" }}>
                  <div style={{ height: 1, background: "rgba(255,255,255,0.06)", marginBottom: 14 }} />
                  <div style={{ fontSize: 13, color: "#cbd5e1", fontWeight: 500, lineHeight: 1.6, marginBottom: 14 }}>
                    {mail.message}
                  </div>

                  {hasReward && (
                    <div style={{
                      background: "rgba(0,0,0,0.2)", border: "1px solid rgba(255,255,255,0.08)",
                      borderRadius: 14, padding: "12px 14px", marginBottom: 14,
                    }}>
                      <div style={{ fontSize: 10, color: "#64748b", fontWeight: 800, letterSpacing: "1px", marginBottom: 8 }}>REWARD</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        {(mail.reward.type === "gold" || mail.reward.gold > 0) && (
                          <div style={{ display: "flex", alignItems: "center", gap: 5, background: "rgba(251,191,36,0.1)", border: "1px solid rgba(251,191,36,0.3)", borderRadius: 10, padding: "5px 10px" }}>
                            <span style={{ fontSize: 16 }}>🪙</span>
                            <span style={{ fontSize: 13, fontWeight: 900, color: "#fbbf24" }}>
                              {mail.reward.type === "gold" ? Number(mail.reward.amount).toLocaleString() : mail.reward.gold.toLocaleString()} Gold
                            </span>
                          </div>
                        )}
                        {(mail.reward.type === "diamonds" || mail.reward.diamonds > 0) && (
                          <div style={{ display: "flex", alignItems: "center", gap: 5, background: "rgba(56,189,248,0.1)", border: "1px solid rgba(56,189,248,0.3)", borderRadius: 10, padding: "5px 10px" }}>
                            <span style={{ fontSize: 16 }}>💎</span>
                            <span style={{ fontSize: 13, fontWeight: 900, color: "#38bdf8" }}>
                              {mail.reward.type === "diamonds" ? Number(mail.reward.amount).toLocaleString() : mail.reward.diamonds.toLocaleString()} WB Diamonds
                            </span>
                          </div>
                        )}
                        {mail.reward.label && (
                          <div style={{ display: "flex", alignItems: "center", gap: 5, background: "rgba(167,139,250,0.1)", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 10, padding: "5px 10px" }}>
                            <span style={{ fontSize: 16 }}>🎁</span>
                            <span style={{ fontSize: 13, fontWeight: 900, color: "#a78bfa" }}>{mail.reward.label}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {hasReward && (
                    mail.claimed ? (
                      <div style={{
                        textAlign: "center", padding: "10px", borderRadius: 12,
                        background: "rgba(71,85,105,0.2)", border: "1px solid rgba(71,85,105,0.3)",
                        fontSize: 12, color: "#64748b", fontWeight: 700,
                      }}>✓ Reward Already Claimed</div>
                    ) : (
                      <button
                        disabled={claiming === mail.id}
                        onClick={() => handleClaim(mail)}
                        className="btn-hover"
                        style={{
                          width: "100%", padding: "13px", borderRadius: 14,
                          background: "linear-gradient(135deg, #f59e0b, #d97706)",
                          border: "none", color: "#fff", fontWeight: 900, fontSize: 14,
                          cursor: claiming === mail.id ? "default" : "pointer",
                          opacity: claiming === mail.id ? 0.7 : 1,
                          boxShadow: "0 6px 18px rgba(245,158,11,0.35)",
                        }}
                      >{claiming === mail.id ? "Claiming..." : "🎁 Claim Reward"}</button>
                    )
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  // ── Network/Firebase health state ──
  // Set once (globally, via the "firebase-unavailable" event) if Firebase
  // fails to load or initialize — e.g. no internet permission in a
  // WebView-packaged APK, or the device is offline. Local/offline features
  // (vs AI, pass-and-play) keep working either way; this just drives a
  // dismissible banner so the user understands why online features (random
  // matchmaking, friends, mailbox, store sync) aren't responding.
  const [firebaseUnavailable, setFirebaseUnavailable] = useState(false);
  const [showNetworkBanner, setShowNetworkBanner] = useState(true);

  useEffect(() => {
    function handleFirebaseUnavailable() {
      setFirebaseUnavailable(true);
      setShowNetworkBanner(true);
    }
    window.addEventListener("firebase-unavailable", handleFirebaseUnavailable);
    return () => window.removeEventListener("firebase-unavailable", handleFirebaseUnavailable);
  }, []);

  // ── Local identity state (no Google/Firebase Auth — device-local profile) ──
  // authStatus: "checking" | "signed-out" | "signed-in"
  // "signed-in" here just means "has chosen to continue" (always as guest).
  const [authStatus, setAuthStatus] = useState("checking");
  const [localUid, setLocalUid] = useState(null); // persisted random device id, or null
  const [authError, setAuthError] = useState("");

  // ── Profile state (name + unique friend UID, stored against localUid) ──
  // profileStatus: "idle" | "loading" | "needs-name" | "ready"
  const [profileStatus, setProfileStatus] = useState("idle");
  const [profile, setProfile] = useState(null); // { name, friendCode, uid, photoURL } | null
  const [nameInput, setNameInput] = useState("");
  const [profileError, setProfileError] = useState("");
  const [profileSaving, setProfileSaving] = useState(false);
  const [profilePanelOpen, setProfilePanelOpen] = useState(false);

  // ── Wallet state (Gold + WB Diamonds) ──
  const [wallet, setWallet] = useState({ gold: 0, diamonds: 0 });

  // ── Store state ──
  const [showStore, setShowStore] = useState(false);
  const [ownedItems, setOwnedItems] = useState([]); // array of item ids
  const [equippedEmoji, setEquippedEmoji] = useState(null); // item id | null

  // ── Mailbox state ──
  const [showMailbox, setShowMailbox] = useState(false);
  const [mailUnread, setMailUnread] = useState(0);

  // ── Achievements state ──
  const [showAchievements, setShowAchievements] = useState(false);
  const [achievementProgress, setAchievementProgress] = useState(null); // loaded from Firebase
  const [achievementToast, setAchievementToast] = useState(null); // { title, reward }

  // ── Friends state (Stage 5) ──
  const [showFriendsPanel, setShowFriendsPanel] = useState(false);
  const [friendsTab, setFriendsTab] = useState("friends"); // "friends" | "requests" | "add"
  const [searchCode, setSearchCode] = useState("");
  const [searchResult, setSearchResult] = useState(null); // { uid, name, photoURL, friendCode } | null | "not-found"
  const [searchLoading, setSearchLoading] = useState(false);
  const [searchError, setSearchError] = useState("");
  const [friendsList, setFriendsList] = useState([]); // [{ uid, name, photoURL, friendCode }]
  const [incomingRequests, setIncomingRequests] = useState([]); // [{ fromUid, fromName, fromPhoto, createdAt }]
  const [requestSentTo, setRequestSentTo] = useState(null); // uid we just sent a request to, for button feedback

  // ── Game invite state — invite a friend directly into an online match ──
  const [invitingUid, setInvitingUid] = useState(null); // uid currently being invited (button feedback)
  const [incomingInvite, setIncomingInvite] = useState(null); // { fromUid, fromName, roomCode, createdAt } | null
  const [pendingInvite, setPendingInvite] = useState(null); // { toUid } — invite to write once host's room code exists
  const [joinCodeForInvite, setJoinCodeForInvite] = useState(null); // room code to auto-join when accepting an invite

  // On mount, check localStorage for an existing device id. If found, look
  // up its saved profile (name + friend UID) from Realtime Database — same
  // "users" node as before, just keyed by a locally-generated id instead of
  // a Firebase Auth uid. If no device id exists yet, show the start screen.
  useEffect(() => {
    let stored = null;
    try { stored = localStorage.getItem("washu-ttt-device-id"); } catch (e) {}
    if (!stored) {
      setAuthStatus("signed-out");
      return;
    }
    setLocalUid(stored);
    setAuthStatus("signed-in");
    setProfileStatus("loading");
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`bannedUsers/${stored}`).once("value").then((banSnap) => {
        if (banSnap.val()) {
          setProfileStatus("banned");
          return null;
        }
        return db.ref(`users/${stored}`).once("value");
      });
    }).then((snap) => {
      if (!snap) return; // banned, already handled above
      const existing = snap.val();
      if (existing && existing.name) {
        setProfile(existing);
        setProfileStatus("ready");
        loadOrInitWallet(stored);
      } else {
        setProfileStatus("needs-name");
      }
    }).catch(() => {
      setProfileStatus("needs-name");
    });
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Continue as guest: generate (or reuse) a local device id, persist it,
  // and proceed to name entry. No Google, no popup, no network auth call.
  function handleGuestContinue() {
    setAuthError("");
    let id = null;
    try { id = localStorage.getItem("washu-ttt-device-id"); } catch (e) {}
    if (!id) {
      id = `local-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      try { localStorage.setItem("washu-ttt-device-id", id); } catch (e) {}
    }
    setLocalUid(id);
    setAuthStatus("signed-in");
    setProfileStatus("loading");
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`bannedUsers/${id}`).once("value").then((banSnap) => {
        if (banSnap.val()) {
          setProfileStatus("banned");
          return null;
        }
        return db.ref(`users/${id}`).once("value");
      });
    }).then((snap) => {
      if (!snap) return; // banned, already handled above
      const existing = snap.val();
      if (existing && existing.name) {
        setProfile(existing);
        setProfileStatus("ready");
        loadOrInitWallet(id);
      } else {
        setProfileStatus("needs-name");
      }
    }).catch(() => setProfileStatus("needs-name"));
  }

  // "Sign out": forget the local profile on this device. Does not delete
  // the saved users/{id} record server-side, so re-entering the same name
  // later would just create a new id/profile (acceptable for a local-only
  // identity system with no real account).
  function handleSignOut() {
    try { localStorage.removeItem("washu-ttt-device-id"); } catch (e) {}
    setLocalUid(null);
    setAuthStatus("signed-out");
    setProfile(null);
    setProfileStatus("idle");
  }

  // Called when the user submits their name on the name-entry screen.
  // Generates a unique friend UID and saves the profile to users/{localUid}.
  function handleSaveProfile() {
    const trimmed = nameInput.trim();
    if (!trimmed) {
      setProfileError("Please enter a name.");
      return;
    }
    if (trimmed.length > 20) {
      setProfileError("Name must be 20 characters or fewer.");
      return;
    }
    setProfileError("");
    setProfileSaving(true);
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const friendCode = generateFriendCode();
      const newProfile = {
        name: trimmed,
        friendCode,
        uid: localUid,
        photoURL: null,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
      };
      // Also index by friendCode so friend-search-by-UID doesn't need to
      // scan all users.
      return db.ref(`users/${localUid}`).set(newProfile)
        .then(() => db.ref(`friendCodes/${friendCode}`).set(localUid))
        .then(() => newProfile);
    }).then((newProfile) => {
      setProfile(newProfile);
      setProfileStatus("ready");
      setProfileSaving(false);
      loadOrInitWallet(localUid);
    }).catch((err) => {
      setProfileSaving(false);
      setProfileError(err.message || "Could not save profile. Please try again.");
    });
  }

  // Loads the player's wallet from Firebase. If it doesn't exist yet
  // (new player, or existing player before currency was added), writes
  // the default starting values so every player always has a balance.
  function loadOrInitWallet(uid) {
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const walletRef = db.ref(`wallets/${uid}`);
      walletRef.once("value").then((snap) => {
        const existing = snap.val();
        if (existing) {
          setWallet({ gold: existing.gold ?? 0, diamonds: existing.diamonds ?? 0 });
        } else {
          const defaults = { gold: 100, diamonds: 10 };
          walletRef.set(defaults).then(() => setWallet(defaults)).catch(() => {});
        }
      }).catch(() => {});

      // Load owned store items + equipped emoji
      db.ref(`storeItems/${uid}`).once("value").then((snap) => {
        const data = snap.val();
        if (data) {
          setOwnedItems(data.owned || []);
          setEquippedEmoji(data.equipped || null);
        }
      }).catch(() => {});

      // Load achievement progress
      db.ref(`achievements/${uid}`).once("value").then((snap) => {
        const data = snap.val() || {};
        setAchievementProgress(data);

        // Track login days — record today's date string; count unique days
        const today = new Date().toISOString().slice(0, 10);
        const loginDays = data.loginDates || {};
        if (!loginDays[today]) {
          const updatedDays = { ...loginDays, [today]: true };
          const dayCount = Object.keys(updatedDays).length;
          db.ref(`achievements/${uid}`).update({
            loginDates: updatedDays,
            loginDays: dayCount,
          }).then(() => {
            setAchievementProgress(prev => ({
              ...prev,
              loginDates: updatedDays,
              loginDays: dayCount,
            }));
          }).catch(() => {});
        }
      }).catch(() => {});

      // Seed welcome reward mail for new players (once only)
      const welcomeMailRef = db.ref(`userMails/${uid}/welcome_reward`);
      welcomeMailRef.once("value").then((snap) => {
        if (!snap.val()) {
          welcomeMailRef.set({
            type: "reward",
            title: "Welcome Reward",
            message: "Welcome to WASHU PRO! Thank you for playing our game. Here is a reward to get you started on your journey. Good luck out there!",
            date: new Date().toLocaleDateString(),
            sentAt: Date.now(),
            reward: { gold: 500, diamonds: 0 },
            claimed: false,
            read: false,
          }).catch(() => {});
        }
      }).catch(() => {});

      // Live-track unread mail count (personal + global unread)
      const personalMailRef = db.ref(`userMails/${uid}`);
      const globalMailRef   = db.ref("globalMail");
      const globalClaimsRef = db.ref(`globalMailClaims/${uid}`);

      let personalMails = {};
      let globalMails   = {};
      let globalClaims  = {};

      function updateUnread() {
        let count = 0;
        Object.values(personalMails).forEach(m => { if (!m.read) count++; });
        Object.keys(globalMails).forEach(id => {
          const claim = globalClaims[id];
          if (!claim) count++; // never interacted = unread
        });
        setMailUnread(count);
      }

      personalMailRef.on("value", snap => { personalMails = snap.val() || {}; updateUnread(); });
      globalMailRef.on("value",   snap => { globalMails   = snap.val() || {}; updateUnread(); });
      globalClaimsRef.on("value", snap => { globalClaims  = snap.val() || {}; updateUnread(); });
    });
  }

  // Purchase a store item: deduct currency + save ownership to Firebase.
  function handlePurchase(itemId, currency, cost, onSuccess, onFail) {
    if (!localUid) { onFail(); return; }
    const currentBalance = currency === "diamonds" ? wallet.diamonds : wallet.gold;
    if (currentBalance < cost) { onFail(); return; }
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const walletRef = db.ref(`wallets/${localUid}`);
      const storeRef = db.ref(`storeItems/${localUid}`);
      const newBalance = currentBalance - cost;
      const newOwned = [...ownedItems, itemId];
      return Promise.all([
        walletRef.update({ [currency]: newBalance }),
        storeRef.update({ owned: newOwned }),
      ]).then(() => {
        setWallet(w => ({ ...w, [currency]: newBalance }));
        setOwnedItems(newOwned);
        onSuccess();
      });
    }).catch(() => onFail());
  }

  // Equip/unequip an emoji and persist to Firebase.
  function handleEquip(itemId) {
    setEquippedEmoji(itemId);
    if (!localUid) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      db.ref(`storeItems/${localUid}`).update({ equipped: itemId || null }).catch(() => {});
    });
  }

  // Called by MailboxScreen when a reward is successfully claimed.
  // Adds the reward amounts to the player's wallet in Firebase + local state.
  // Supports both admin mail format { type: "gold"|"diamonds", amount: 1000 }
  // and legacy format { gold: 1000, diamonds: 50 }
  function handleClaimReward(reward) {
    if (!localUid || !reward) return;
    let goldDelta = 0;
    let diamondsDelta = 0;
    if (reward.type === "gold")          goldDelta     = Number(reward.amount) || 0;
    else if (reward.type === "diamonds") diamondsDelta = Number(reward.amount) || 0;
    else {
      goldDelta     = reward.gold     || 0;
      diamondsDelta = reward.diamonds || 0;
    }
    if (goldDelta === 0 && diamondsDelta === 0) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const walletRef = db.ref(`wallets/${localUid}`);
      walletRef.transaction((current) => {
        const w = current || { gold: 0, diamonds: 0 };
        return {
          gold:     (w.gold     || 0) + goldDelta,
          diamonds: (w.diamonds || 0) + diamondsDelta,
        };
      }).then((result) => {
        if (result.committed && result.snapshot.val()) {
          const w = result.snapshot.val();
          setWallet({ gold: w.gold, diamonds: w.diamonds });
        }
      }).catch(() => {});
    });
  }

  // Update achievement progress in local state (called from AchievementsScreen after claim)
  function handleAchievementProgressUpdate(newProgress) {
    setAchievementProgress(newProgress);
  }

  // Record an online match result against this device's profile, used by
  // the admin tool to compute win rates (e.g. flagging suspiciously high
  // win rates as possible cheating). Only called for online matches, not
  // AI or local Friend mode. Silently no-ops if there's no profile yet.
  function recordGameResult(outcome) {
    // outcome: "win" | "loss" | "draw"
    if (!localUid || !profile) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const ref = db.ref(`gameResults/${localUid}`);
      return ref.transaction((current) => {
        const stats = current || { wins: 0, losses: 0, draws: 0, totalGames: 0 };
        return {
          wins: stats.wins + (outcome === "win" ? 1 : 0),
          losses: stats.losses + (outcome === "loss" ? 1 : 0),
          draws: stats.draws + (outcome === "draw" ? 1 : 0),
          totalGames: stats.totalGames + 1,
        };
      }).then((result) => {
        if (result.committed && result.snapshot.val()) {
          const stats = result.snapshot.val();
          // Mirror to achievements progress node for achievement tracking
          const achRef = db.ref(`achievements/${localUid}`);
          achRef.transaction((cur) => {
            const prev = cur || {};
            return {
              ...prev,
              wins: stats.wins,
              totalGames: stats.totalGames,
            };
          }).then((achResult) => {
            if (achResult.committed && achResult.snapshot.val()) {
              setAchievementProgress(prev => ({
                ...prev,
                wins: stats.wins,
                totalGames: stats.totalGames,
              }));
            }
          }).catch(() => {});
        }
      });
    }).catch(() => {});
  }

  // Live-listen to this user's friends list and incoming friend requests
  // once their profile is ready. Cleans up listeners on sign-out/unmount.
  useEffect(() => {
    if (profileStatus !== "ready" || !localUid) {
      setFriendsList([]);
      setIncomingRequests([]);
      return;
    }
    let friendsRef, requestsRef;
    let cancelled = false;
    loadFirebase().then((firebase) => {
      if (cancelled) return;
      const db = firebase.database();
      const myUid = localUid;

      friendsRef = db.ref(`friends/${myUid}`);
      friendsRef.on("value", (snap) => {
        const val = snap.val() || {};
        const uids = Object.keys(val);
        Promise.all(uids.map(uid => db.ref(`users/${uid}`).once("value").then(s => s.val())))
          .then(users => setFriendsList(users.filter(Boolean)));
      });

      requestsRef = db.ref(`friendRequests/${myUid}`);
      requestsRef.on("value", (snap) => {
        const val = snap.val() || {};
        setIncomingRequests(Object.values(val).filter(r => r.status === "pending"));
      });
    });
    return () => {
      cancelled = true;
      if (friendsRef) friendsRef.off();
      if (requestsRef) requestsRef.off();
    };
  }, [profileStatus, localUid]);

  // Look up a player by their friend UID (e.g. "WASHU-7K2P9Q").
  function handleSearchFriendCode() {
    const code = searchCode.trim().toUpperCase();
    if (!code) return;
    setSearchError("");
    setSearchResult(null);
    setSearchLoading(true);
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`friendCodes/${code}`).once("value");
    }).then((snap) => {
      const uid = snap.val();
      if (!uid) {
        setSearchResult("not-found");
        setSearchLoading(false);
        return;
      }
      if (uid === localUid) {
        setSearchError("That's your own UID.");
        setSearchResult(null);
        setSearchLoading(false);
        return;
      }
      loadFirebase().then((firebase) => {
        const db = firebase.database();
        return db.ref(`users/${uid}`).once("value");
      }).then((snap) => {
        setSearchResult(snap.val() || "not-found");
        setSearchLoading(false);
      });
    }).catch((err) => {
      setSearchLoading(false);
      setSearchError(err.message || "Search failed. Please try again.");
    });
  }

  // Send a friend request to a user found via search.
  function handleSendFriendRequest(targetUser) {
    if (!localUid || !profile) return;
    setRequestSentTo(targetUser.uid);
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`friendRequests/${targetUser.uid}/${localUid}`).set({
        fromUid: localUid,
        fromName: profile.name,
        fromPhoto: profile.photoURL || null,
        status: "pending",
        createdAt: firebase.database.ServerValue.TIMESTAMP,
      });
    }).catch(() => setRequestSentTo(null));
  }

  // Accept an incoming request: write the friendship on both sides, then
  // remove the request.
  function handleAcceptRequest(request) {
    if (!localUid) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      const myUid = localUid;
      const theirUid = request.fromUid;
      return Promise.all([
        db.ref(`friends/${myUid}/${theirUid}`).set(true),
        db.ref(`friends/${theirUid}/${myUid}`).set(true),
        db.ref(`friendRequests/${myUid}/${theirUid}`).remove(),
      ]);
    }).catch(() => {});
  }

  function handleDeclineRequest(request) {
    if (!localUid) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`friendRequests/${localUid}/${request.fromUid}`).remove();
    }).catch(() => {});
  }

  // Live-listen for an incoming game invite from a friend. Stored at
  // gameInvites/{toUid}/{fromUid}. Invites older than 10 seconds are
  // considered expired (the room would likely be stale/gone by then) and
  // are auto-removed so they never resurface on a later app open.
  useEffect(() => {
    if (profileStatus !== "ready" || !localUid) {
      setIncomingInvite(null);
      return;
    }
    const INVITE_TTL_MS = 10000; // 10 seconds
    let inviteRef;
    let cancelled = false;
    let expiryTimer = null;

    loadFirebase().then((firebase) => {
      if (cancelled) return;
      const db = firebase.database();
      inviteRef = db.ref(`gameInvites/${localUid}`);
      inviteRef.on("value", (snap) => {
        if (expiryTimer) { clearTimeout(expiryTimer); expiryTimer = null; }
        const val = snap.val() || {};
        const now = Date.now();
        const entries = Object.entries(val);

        // Drop and delete anything already past the 10s TTL.
        const fresh = [];
        entries.forEach(([fromUid, inv]) => {
          const age = now - (inv.createdAt || 0);
          if (age > INVITE_TTL_MS) {
            db.ref(`gameInvites/${localUid}/${fromUid}`).remove().catch(() => {});
          } else {
            fresh.push(inv);
          }
        });

        if (fresh.length === 0) {
          setIncomingInvite(null);
          return;
        }

        fresh.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const next = fresh[0];
        setIncomingInvite(next);

        // Schedule auto-dismiss + cleanup right when this invite's TTL hits,
        // so it disappears from screen even if the user does nothing.
        const msLeft = INVITE_TTL_MS - (now - (next.createdAt || 0));
        expiryTimer = setTimeout(() => {
          setIncomingInvite(curr => (curr && curr.fromUid === next.fromUid ? null : curr));
          db.ref(`gameInvites/${localUid}/${next.fromUid}`).remove().catch(() => {});
        }, Math.max(0, msLeft));
      });
    });

    return () => {
      cancelled = true;
      if (expiryTimer) clearTimeout(expiryTimer);
      if (inviteRef) inviteRef.off();
    };
  }, [profileStatus, localUid]);

  // Invite a friend to a direct online match. Opens this device's own
  // OnlineLobby in auto-create (host) mode — it generates its own room
  // code via the existing, unmodified handleCreate() flow. Once that real
  // code is reported back via onRoomCodeGenerated, the invite record is
  // written to the database for the friend to see.
  function handleInviteFriend(friend) {
    if (!localUid || !profile) return;
    setInvitingUid(friend.uid);
    setShowFriendsPanel(false);
    setPendingInvite({ toUid: friend.uid }); // who to notify once the room code exists
    setMode("online-lobby");
  }

  // Called by OnlineLobby once it has generated a real room code (host
  // side only). Writes the invite now that we know the actual code.
  function handleRoomCodeGenerated(roomCode) {
    const invite = pendingInvite;
    if (!invite || !localUid || !profile) return;
    setPendingInvite(null);
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`gameInvites/${invite.toUid}/${localUid}`).set({
        fromUid: localUid,
        fromName: profile.name,
        roomCode,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
      });
    }).then(() => setInvitingUid(null)).catch(() => setInvitingUid(null));
  }

  // Accept an incoming invite: clear it from the database, then open
  // OnlineLobby in join mode with the room code pre-filled, auto-joining
  // via the existing, unmodified handleJoin() flow.
  function handleAcceptInvite(invite) {
    if (!localUid) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`gameInvites/${localUid}/${invite.fromUid}`).remove();
    }).catch(() => {});
    setIncomingInvite(null);
    setJoinCodeForInvite(invite.roomCode);
    setMode("online-lobby");
  }

  function handleDeclineInvite(invite) {
    if (!localUid) return;
    loadFirebase().then((firebase) => {
      const db = firebase.database();
      return db.ref(`gameInvites/${localUid}/${invite.fromUid}`).remove();
    }).catch(() => {});
    setIncomingInvite(null);
  }

  const [mode, setMode] = useState(null); // null | "ai" | "friend" | "online-lobby" | "online"
  const [board, setBoard] = useState(Array(9).fill(null));
  const [xIsNext, setXIsNext] = useState(true);
  const [scores, setScores] = useState({ X: 0, O: 0, draw: 0 });
  const [result, setResult] = useState(null);
  const [thinking, setThinking] = useState(false);
  const [newCells, setNewCells] = useState({});
  const [showConfetti, setShowConfetti] = useState(false);
  const aiScheduled = useRef(false);

  // AI difficulty state
  const [aiDifficulty, setAiDifficulty] = useState("unbeatable"); // "easy" | "hard" | "unbeatable"
  const [showDifficultyPicker, setShowDifficultyPicker] = useState(false);
  const [startMessage, setStartMessage] = useState(null); // "You start first" | "AI starts first" | null

  // Online multiplayer state
  const [onlineConn, setOnlineConn] = useState(null);
  const [onlinePeer, setOnlinePeer] = useState(null);
  const [mySymbol, setMySymbol] = useState(null); // "X" or "O"
  const [onlineRoomCode, setOnlineRoomCode] = useState("");
  const [onlineStatus, setOnlineStatus] = useState("");
  const onlineConnRef = useRef(null);
  // Ref mirror of mySymbol so data handlers always see the latest value
  // without needing to be re-registered when mySymbol state changes.
  const mySymbolRef = useRef(null);
  // Tracks whether the connection has been stable long enough to treat
  // a close event as a genuine disconnect (not an ICE-phase transient close).
  const connStableRef = useRef(false);
  const connStableTimerRef = useRef(null);
  // Set to true when WE initiate the disconnect so the close handler
  // does not incorrectly report "opponent left" to ourselves.
  const leavingRef = useRef(false);

  // Online opponent info (received via START packet)
  const [opponentIsOwner, setOpponentIsOwner] = useState(false);
  const [opponentName, setOpponentName] = useState("Opponent");

  // Developer Encounter Notification
  const [showDevEncounter, setShowDevEncounter] = useState(false);
  const devEncounterTimerRef = useRef(null);

  // Chat state
  const [chatMessages, setChatMessages] = useState([]);
  const [chatOpen, setChatOpen] = useState(false);
  const [unreadCount, setUnreadCount] = useState(0);
  const [floatingReaction, setFloatingReaction] = useState(null);
  const floatingReactionTimer = useRef(null);
  const chatMsgIdRef = useRef(0);

  const triggerConfetti = useCallback(() => {
    setShowConfetti(true);
    setTimeout(() => setShowConfetti(false), 3000);
  }, []);

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addMessage(msg) {
    const id = ++chatMsgIdRef.current;
    setChatMessages(prev => [...prev, { ...msg, id }]);
  }

  function showFloatingReaction(emoji) {
    if (floatingReactionTimer.current) clearTimeout(floatingReactionTimer.current);
    setFloatingReaction(emoji);
    floatingReactionTimer.current = setTimeout(() => setFloatingReaction(null), 1600);
  }

  function handleSendChat(text) {
    addMessage({ type: "text", from: mySymbol, text, time: nowTime() });
    try {
      onlineConnRef.current?.send({ type: "CHAT_MSG", text });
    } catch(e) {}
  }

  function handleSendReaction(emoji, itemId) {
    const isPremiumSticker = !!itemId && PREMIUM_STICKERS.some(s => s.id === itemId);
    addMessage({ type: isPremiumSticker ? "sticker" : "reaction", from: mySymbol, emoji, itemId, time: nowTime() });
    showFloatingReaction(emoji);
    try {
      onlineConnRef.current?.send({ type: "CHAT_REACTION", emoji, itemId, isPremiumSticker });
    } catch(e) {}
  }

  // AI turn effect
  useEffect(() => {
    const isAITurn = mode === "ai" && !xIsNext && !result;
    if (!isAITurn || aiScheduled.current) return;
    aiScheduled.current = true;
    setThinking(true);
    const timer = setTimeout(() => {
      setBoard(prev => {
        const newBoard = [...prev];
        const move = getAIMoveForDifficulty(newBoard, aiDifficulty);
        if (move === -1) { aiScheduled.current = false; setThinking(false); return prev; }
        newBoard[move] = "O";
        playSound("ai.mp3");
        setNewCells(nc => ({ ...nc, [move]: true }));
        setTimeout(() => setNewCells(nc => { const n = {...nc}; delete n[move]; return n; }), 400);
        const res = checkWinner(newBoard);
        if (res) {
          setResult(res);
          setScores(s => ({ ...s, [res.winner]: (s[res.winner] || 0) + 1 }));
          if (res.winner !== "draw") {
            playSound(res.winner === "X" ? "win.mp3" : "lose.mp3");
            if (res.winner === "X") triggerConfetti();
          } else playSound("draw.mp3");
        } else {
          setXIsNext(true);
        }
        aiScheduled.current = false;
        setThinking(false);
        return newBoard;
      });
    }, 650);
    return () => { clearTimeout(timer); aiScheduled.current = false; setThinking(false); };
  }, [mode, xIsNext, result, triggerConfetti, aiDifficulty]);

  // Online: listen for incoming moves and events.
  //
  // IMPORTANT FIX: these listeners used to be attached inside a useEffect
  // keyed on `mode`. That effect only runs AFTER React re-renders following
  // setMode("online"), which is one tick too late — if the opponent sends
  // their first MOVE packet quickly after the handshake, PeerJS delivers it
  // before this listener existed, and the event is lost forever (no replay).
  // That produced exactly the "connected but moves never arrive" bug.
  //
  // Fix: handleData/handleClose/handleError are now stable functions
  // attached SYNCHRONOUSLY inside handleOnlineGameStart, in the same tick
  // the connection becomes known — before any state updates/render occurs.
  // The useEffect below now only handles teardown when leaving online mode.
  function handleData(data) {
    if (data.type === "MOVE") {
      const { index, symbol } = data;
      // Only accept moves from the opponent (not ourselves)
      // and only when it's actually their turn — guards against
      // duplicate / replayed packets causing desync.
      const opponentSymbol = mySymbolRef.current === "X" ? "O" : "X";
      if (symbol !== opponentSymbol) return;
      setBoard(prev => {
        // Reject if cell already occupied (idempotent guard)
        if (prev[index]) return prev;
        // Reject if it's not the opponent's turn
        const expectedNext = prev.filter(Boolean).length % 2 === 0 ? "X" : "O";
        if (symbol !== expectedNext) return prev;
        const newBoard = [...prev];
        newBoard[index] = symbol;
        setNewCells(nc => ({ ...nc, [index]: true }));
        setTimeout(() => setNewCells(nc => { const n = {...nc}; delete n[index]; return n; }), 400);
        playSound("ai.mp3");
        const res = checkWinner(newBoard);
        if (res) {
          setResult(res);
          setScores(s => ({ ...s, [res.winner]: (s[res.winner] || 0) + 1 }));
          if (res.winner !== "draw") {
            playSound(res.winner === mySymbolRef.current ? "win.mp3" : "lose.mp3");
            if (res.winner === mySymbolRef.current) triggerConfetti();
            recordGameResult(res.winner === mySymbolRef.current ? "win" : "loss");
          } else {
            playSound("draw.mp3");
            recordGameResult("draw");
          }
        } else {
          setXIsNext(symbol === "X" ? false : true);
        }
        return newBoard;
      });
    } else if (data.type === "RESET") {
      setBoard(Array(9).fill(null));
      setXIsNext(true);
      setResult(null);
      setThinking(false);
      setNewCells({});
      setShowConfetti(false);
      addMessage({ type: "system", text: "New game started by opponent", time: nowTime() });
    } else if (data.type === "DISCONNECT") {
      setOnlineStatus("Opponent has left the game.");
      addMessage({ type: "system", text: "Connection terminated by partner", time: nowTime() });
    } else if (data.type === "CHAT_MSG") {
      // Read mySymbol from ref so we always have the current value
      // without this handler needing to be re-registered.
      const oppSym = mySymbolRef.current === "X" ? "O" : "X";
      addMessage({ type: "text", from: oppSym, text: data.text, time: nowTime() });
      setChatOpen(prev => {
        if (!prev) setUnreadCount(u => u + 1);
        return prev;
      });
    } else if (data.type === "CHAT_REACTION") {
      const oppSym = mySymbolRef.current === "X" ? "O" : "X";
      const msgType = data.isPremiumSticker ? "sticker" : "reaction";
      addMessage({ type: msgType, from: oppSym, emoji: data.emoji, itemId: data.itemId, time: nowTime() });
      showFloatingReaction(data.emoji);
      setChatOpen(prev => {
        if (!prev) setUnreadCount(u => u + 1);
        return prev;
      });
    }
  }

  function handleClose() {
    // Ignore if we initiated the disconnect, or if the connection
    // hasn't been stable yet (ICE-phase transient close).
    if (leavingRef.current || !connStableRef.current) return;
    setOnlineStatus("Connection failed. Partner left.");
    addMessage({ type: "system", text: "Link lost", time: nowTime() });
  }

  function handleError(err) {
    if (leavingRef.current || !connStableRef.current) return;
    setOnlineStatus(`Error: ${err?.message || "Signal lost"}`);
    addMessage({ type: "system", text: "Critical error", time: nowTime() });
  }

  // Cleanup-only effect: detaches listeners when leaving online mode or
  // on unmount. Attachment now happens synchronously in
  // handleOnlineGameStart (see fix note above), not here.
  useEffect(() => {
    if (mode !== "online") return;
    const conn = onlineConnRef.current;
    if (!conn) return;

    return () => {
      if (connStableTimerRef.current) clearTimeout(connStableTimerRef.current);
      connStableRef.current = false;
      conn.off("data", handleData);
      conn.off("close", handleClose);
      conn.off("error", handleError);
    };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mode]);

  function handleOnlineGameStart({ conn, mySymbol: sym, peer, roomCode, oppIsOwner, oppName }) {
    // Sync the ref BEFORE setting mode so any other code reading it sees
    // the new connection immediately.
    onlineConnRef.current = conn;
    mySymbolRef.current = sym;
    // Reset stability and leave guards for the new connection.
    connStableRef.current = false;
    leavingRef.current = false;
    if (connStableTimerRef.current) clearTimeout(connStableTimerRef.current);

    // Attach listeners SYNCHRONOUSLY, right now, before any setState below
    // triggers a render. This guarantees no MOVE/CHAT packet sent by the
    // opponent immediately after the handshake can ever be missed.
    conn.on("data", handleData);
    conn.on("close", handleClose);
    conn.on("error", handleError);

    // Mark the connection as stable after 8 s — any close before this is
    // an ICE-phase transient and should NOT be shown as a disconnect.
    connStableTimerRef.current = setTimeout(() => {
      connStableRef.current = true;
    }, 8000);

    setOnlineConn(conn);
    setOnlinePeer(peer);
    setMySymbol(sym);
    setOnlineRoomCode(roomCode);
    setOnlineStatus("");
    setOpponentIsOwner(!!oppIsOwner);
    setOpponentName(oppName || "Opponent");
    if (oppIsOwner) {
      setShowDevEncounter(true);
      if (devEncounterTimerRef.current) clearTimeout(devEncounterTimerRef.current);
      devEncounterTimerRef.current = setTimeout(() => setShowDevEncounter(false), 4500);
    }
    setBoard(Array(9).fill(null));
    setXIsNext(true);
    setResult(null);
    setScores({ X: 0, O: 0, draw: 0 });
    setChatMessages([{ id: 0, type: "system", text: "Session established. Good luck!", time: nowTime() }]);
    setChatOpen(false);
    setUnreadCount(0);
    setMode("online");
  }

  function handleClick(i) {
    if (board[i] || result) return;

    if (mode === "online") {
      const myTurn = (xIsNext && mySymbol === "X") || (!xIsNext && mySymbol === "O");
      if (!myTurn) return;
      const symbol = mySymbol;
      playSound("move.mp3");
      const newBoard = [...board];
      newBoard[i] = symbol;
      setNewCells(nc => ({ ...nc, [i]: true }));
      setTimeout(() => setNewCells(nc => { const n = {...nc}; delete n[i]; return n; }), 400);
      setBoard(newBoard);
      try { onlineConnRef.current?.send({ type: "MOVE", index: i, symbol }); } catch(e){}
      const res = checkWinner(newBoard);
      if (res) {
        setResult(res);
        setScores(s => ({ ...s, [res.winner]: (s[res.winner] || 0) + 1 }));
        if (res.winner !== "draw") {
          playSound(res.winner === mySymbol ? "win.mp3" : "lose.mp3");
          if (res.winner === mySymbol) triggerConfetti();
          recordGameResult(res.winner === mySymbol ? "win" : "loss");
        } else {
          playSound("draw.mp3");
          recordGameResult("draw");
        }
      } else {
        setXIsNext(p => !p);
      }
      return;
    }

    if (thinking || (mode === "ai" && !xIsNext)) return;
    playSound("move.mp3");
    const newBoard = [...board];
    const player = xIsNext ? "X" : "O";
    newBoard[i] = player;
    setNewCells(nc => ({ ...nc, [i]: true }));
    setTimeout(() => setNewCells(nc => { const n = {...nc}; delete n[i]; return n; }), 400);
    setBoard(newBoard);
    const res = checkWinner(newBoard);
    if (res) {
      setResult(res);
      setScores(s => ({ ...s, [res.winner]: (s[res.winner] || 0) + 1 }));
      if (res.winner !== "draw") {
        playSound(res.winner === player ? "win.mp3" : "lose.mp3");
        if (res.winner === player) triggerConfetti();
      } else playSound("draw.mp3");
    } else {
      setXIsNext(p => !p);
    }
  }

    playSound("click.mp3");
    aiScheduled.current = false;
    setBoard(Array(9).fill(null));
    setResult(null);
    setThinking(false);
    setNewCells({});
    setShowConfetti(false);
    if (mode === "online") {
      setXIsNext(true);
      try { onlineConnRef.current?.send({ type: "RESET" }); } catch(e){}
    } else if (mode === "ai") {
      // Re-roll who starts on every new AI match.
      const humanStarts = Math.random() < 0.5;
      setXIsNext(humanStarts);
      setStartMessage(humanStarts ? "You start first" : "AI starts first");
      setTimeout(() => setStartMessage(null), 1400);
    } else {
      setXIsNext(true);
    }
  }

  function destroyOnline() {
    if (connStableTimerRef.current) clearTimeout(connStableTimerRef.current);
    connStableRef.current = false;
    leavingRef.current = true;
    try { onlineConnRef.current?.send({ type: "DISCONNECT" }); } catch(e){}
    try { onlineConnRef.current?.close(); } catch(e){}
    try { onlinePeer?.destroy(); } catch(e){}
    onlineConnRef.current = null;
    mySymbolRef.current = null;
    leavingRef.current = false;
    setOnlineConn(null);
    setOnlinePeer(null);
    setMySymbol(null);

                      transition: "all 0.15s", position: "relative",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.15)"; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}
                  >
                    {premiumItem
                      ? <AnimatedSticker frames={premiumItem.frames} size={18} running />
                      : item.emoji
                    }
                  </button>
                );
              })()}
            </div>
          )}

          {/* Scoreboard */}
          <div style={{
            display: "flex", justifyContent: "space-between",
            background: "rgba(0,0,0,0.2)", borderRadius: 24,
            padding: "20px", marginBottom: 20,
            border: "1px solid rgba(255,255,255,0.05)",
          }}>
            {[
              { sym: "X", color: "#a78bfa", label: mode === "ai" ? "PLAYER" : (mode === "online" ? (mySymbol === "X" ? "YOU" : "OPP") : "P1"), isMe: mode === "online" && mySymbol === "X" },
              { sym: "draw", color: "#94a3b8", label: "TIE", isMe: false },
              { sym: "O", color: "#f472b6", label: mode === "ai" ? "AI" : (mode === "online" ? (mySymbol === "O" ? "YOU" : "OPP") : "P2"), isMe: mode === "online" && mySymbol === "O" },
            ].map(({ sym, label, color, isMe }) => {
              const showMyBadge = mode === "online" && isMe && isOwner(localUid);
              const showOppBadge = mode === "online" && !isMe && sym !== "draw" && opponentIsOwner;
              return (
                <div key={sym} style={{ textAlign: "center", flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4, marginBottom: 5, minHeight: 18 }}>
                    <span style={{ fontSize: 10, fontWeight: 800, color: "#64748b" }}>{label}</span>
                    {(showMyBadge || showOppBadge) && <OwnerBadge size="sm" />}
                  </div>
                  <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{scores[sym] ?? 0}</div>
                  <div style={{ width: 20, height: 3, background: color, margin: "8px auto 0", borderRadius: 10 }}></div>
                </div>
              );
            })}
          </div>

          {/* Status Banner */}
          <div style={{
            textAlign: "center", color: "#fff", fontSize: 14, fontWeight: 900,
            padding: "16px", borderRadius: 18, marginBottom: 20,
            background: statusGradient,
            boxShadow: "0 10px 20px rgba(0,0,0,0.2)",
            letterSpacing: "1px",
            animation: thinking ? "thinkingPulse 1.5s infinite" : "none",
            transition: "background 0.5s ease",
          }}>
            {statusText}
          </div>

          {/* Board */}
          <div style={{
            display: "grid", gridTemplateColumns: "repeat(3, 1fr)",
            gap: 12, marginBottom: 25,
          }}>
            {board.map((val, i) => {
              const isWin = winLine.includes(i);
              const isNew = newCells[i];
              const clickable = isCellClickable(i);
              return (
                <button 
                  key={i} 
                  onClick={() => handleClick(i)} 
                  className="cell-hover"
                  style={{
                  aspectRatio: "1", borderRadius: 20, fontWeight: 900,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: val ? "42px" : "14px",
                  color: val === "X" ? "#a78bfa" : "#f472b6",
                  background: isWin
                    ? (val === "X" ? "rgba(167,139,250,0.2)" : "rgba(244,114,182,0.2)")
                    : "rgba(255,255,255,0.03)",
                  border: isWin
                    ? `2px solid ${val === "X" ? "#a78bfa" : "#f472b6"}`
                    : "1px solid rgba(255,255,255,0.08)",
                  cursor: clickable ? "pointer" : "default",
                  transition: "all 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
                  animation: isNew ? "cellPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both" : (isWin ? "winPulse 1.5s infinite" : "none"),
                  textShadow: val ? `0 0 15px ${val === "X" ? "rgba(167,139,250,0.6)" : "rgba(244, 114, 182, 0.6)"}` : "none",
                  boxShadow: isNew ? "0 0 20px rgba(255,255,255,0.1)" : "none",
                }}>
                  {val || " "}
                </button>
              );
            })}
          </div>

          {/* Action Buttons */}
          <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
            <button 
              className="btn-hover"
              style={{
              flex: 1.5, padding: "16px", borderRadius: 16,
              background: "#7c3aed",
              color: "#fff", border: "none",
              fontWeight: 800, fontSize: 14, cursor: "pointer",
              boxShadow: "0 8px 15px rgba(124, 58, 237, 0.3)",
            }}
              onClick={reset}
            >NEW MATCH</button>
            <button 
              className="btn-hover"
              style={{
              flex: 1, padding: "16px", borderRadius: 16,
              background: "rgba(255,255,255,0.05)", color: "#94a3b8",
              border: "1px solid rgba(255,255,255,0.1)",
              fontWeight: 700, fontSize: 14, cursor: "pointer",
            }}
              onClick={backToMenu}
            >EXIT</button>
          </div>

          {/* Chat panel — only in online mode */}
          {mode === "online" && (
            <div style={{ marginBottom: 20 }}>
              <ChatPanel
                messages={chatMessages}
                onSend={handleSendChat}
                onReaction={handleSendReaction}
                mySymbol={mySymbol}
                isOpen={chatOpen}
                onToggle={() => { setChatOpen(o => !o); setUnreadCount(0); }}
                unreadCount={unreadCount}
                myIsOwner={isOwner(localUid)}
                opponentIsOwner={opponentIsOwner}
              />
            </div>
          )}

          <div style={{ 
            display: "flex", justifyContent: "center", 
            paddingTop: 10, borderTop: "1px solid rgba(255,255,255,0.05)" 
          }}>
            <div style={{ fontSize: 10, color: "#475569", fontWeight: 800, letterSpacing: "1px" }}>
              DESIGNED BY <span style={{ color: "#64748b" }}>WASHU BHARDWAJ</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
      // ── Error Boundary: last line of defense against a blank screen ──
      // If anything throws during render (a bug, an unexpected null, etc.)
      // React would otherwise unmount the whole tree and leave a blank
      // page with no clue why. This catches that and shows a visible,
      // dismissible-by-reload message instead.
      class RootErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { error: null };
        }
        static getDerivedStateFromError(error) {
          return { error };
        }
        componentDidCatch(error, info) {
          console.error("Uncaught render error:", error, info);
        }
        render() {
          if (this.state.error) {
            return (
              <div style={{
                minHeight: "100vh",
                background: "#07030f",
                color: "#fff",
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                justifyContent: "center",
                padding: "24px",
                textAlign: "center",
                fontFamily: "system-ui, -apple-system, sans-serif",
              }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>
                  Something went wrong loading the game
                </div>
                <div style={{ fontSize: 13, opacity: 0.7, maxWidth: 360 }}>
                  {String(this.state.error && this.state.error.message || this.state.error)}
                </div>
              </div>
            );
          }
          return this.props.children;
        }
      }

      // Safety net: an uncaught error or unhandled promise rejection should
      // never silently freeze the app with no feedback. These just log for
      // now (visible via remote debugging), since the ErrorBoundary above
      // already handles render-time errors with a visible fallback.
      window.addEventListener("error", (e) => {
        console.error("Uncaught error:", e.error || e.message);
      });
      window.addEventListener("unhandledrejection", (e) => {
        console.error("Unhandled promise rejection:", e.reason);
      });

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <RootErrorBoundary>
          <App />
        </RootErrorBoundary>
      );
    </script>
  </body>
</html>
